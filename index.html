<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alien501</title>
    <link rel="stylesheet" href="style.css">
    <script src="/libs/anime.min.js"></script>

  </head>
  <body>
    <div id="container">
      <img id="bgVideo" class="background-media" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExZGpjajMyNHNycXN5M2p0d2ZwcjNuejlyeWRuZW5nZWZqcjYwYXBuZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uFmH8za4E6M5STIiTu/giphy.gif" alt="">
      <canvas id="embers"></canvas>

      <div class="day-container">
        <p class="greeting" id="greeting" title="Click to set your name"></p>
        <p class="day">Day Here</p>
        <p class="focus-line" id="focus-line" title="Click to set today's focus"></p>
      </div>

      <div class="time-container">
        <div>
          <p class="time">TIME HERE</p>
        </div>
        <div>
          <p class="date">Day Month, year</p>
        </div>
      </div>

      <div id="todo-container">
        <div class="to-do-head">
          <p class="to-do-title">To-do<span id="todo-count"></span></p>
          <button id="todo-add-btn" title="Add task" aria-label="Add task"><svg width="64px" height="64px" stroke-width="1.2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" color="currentColor"><path d="M6 12H12M18 12H12M12 12V6M12 12V18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>
        </div>
        <div>
          <div id="todo-list">
          </div>
          <p id="todo-empty" class="empty-state">Nothing here yet. Add your first task.</p>
        </div>
      </div>

      <div id="most-visited-sites">
        <div class="most-visited">
          <div class="site-list">
          </div>
          <div class="most-visited-add">
            <button id="most-add-btn" title="Add bookmark" aria-label="Add bookmark"><svg width="16" height="16" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2.75C8 2.47386 7.77614 2.25 7.5 2.25C7.22386 2.25 7 2.47386 7 2.75V7H2.75C2.47386 7 2.25 7.22386 2.25 7.5C2.25 7.77614 2.47386 8 2.75 8H7V12.25C7 12.5261 7.22386 12.75 7.5 12.75C7.77614 12.75 8 12.5261 8 12.25V8H12.25C12.5261 8 12.75 7.77614 12.75 7.5C12.75 7.22386 12.5261 7 12.25 7H8V2.75Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path></svg></button>
          </div>
        </div>
      </div>

      <div id="pomodoro" class="pomodoro">
        <div class="pomo-header">
          <span class="pomo-mode" id="pomo-mode">Focus</span>
          <span class="pomo-round" id="pomo-round"></span>
        </div>
        <div class="pomo-time" id="pomo-time">25:00</div>
        <div class="pomo-controls">
          <button id="pomo-toggle" class="pomo-btn pomo-primary">Start</button>
          <button id="pomo-reset" class="pomo-btn" title="Reset" aria-label="Reset timer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"></path><path d="M3 3v5h5"></path></svg>
          </button>
        </div>
      </div>

      <button id="settings-btn" class="settings-btn" title="Settings" aria-label="Open settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>

      <div id="settings-panel" class="settings-panel" aria-hidden="true">
        <div class="settings-head">
          <p class="settings-title">Settings</p>
          <button id="settings-close" class="settings-close" title="Close" aria-label="Close settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
          </button>
        </div>

        <div class="settings-section">
          <label class="settings-label" for="set-name">Your name</label>
          <input type="text" id="set-name" class="settings-input" placeholder="Add your name" maxlength="24">
        </div>

        <div class="settings-section">
          <label class="settings-label" for="set-focus">Today's focus</label>
          <input type="text" id="set-focus" class="settings-input" placeholder="What matters most today?" maxlength="80">
        </div>

        <div class="settings-section">
          <span class="settings-label">Accent colour</span>
          <div class="accent-swatches" id="accent-swatches"></div>
        </div>

        <div class="settings-section">
          <span class="settings-label">Pomodoro lengths (min)</span>
          <div class="pomo-lengths">
            <label>Focus <input type="number" id="set-focus-len" class="settings-input pomo-num" min="1" max="120" value="25"></label>
            <label>Break <input type="number" id="set-break-len" class="settings-input pomo-num" min="1" max="60" value="5"></label>
          </div>
        </div>

        <div class="settings-section">
          <span class="settings-label">Background media</span>
          <div class="background-media-settings">
            <div class="background-preview" id="bg-preview"></div>
            <div class="background-current">
              <span class="settings-label">Current media</span>
              <p class="settings-hint">Upload an image, GIF, or video.</p>
              <label class="background-slot"><span>Update</span><input type="file" id="bg-default" accept="image/*,video/*"><small id="bg-default-status">Default</small></label>
            </div>
          </div>
          <label class="toggle-row background-timeline-toggle"><span>Use timeline</span><input type="checkbox" id="tog-background-timeline" class="toggle"></label>
          <p class="settings-hint timeline-hint">Empty periods use the media from the previous period.</p>
          <div class="background-slots" id="background-slots">
            <label class="background-slot"><span>Morning</span><input type="file" id="bg-morning" accept="image/*,video/*"><small id="bg-morning-status">Default</small></label>
            <label class="background-slot"><span>Afternoon</span><input type="file" id="bg-afternoon" accept="image/*,video/*"><small id="bg-afternoon-status">Uses morning</small></label>
            <label class="background-slot"><span>Evening</span><input type="file" id="bg-evening" accept="image/*,video/*"><small id="bg-evening-status">Uses morning</small></label>
            <label class="background-slot"><span>Night</span><input type="file" id="bg-night" accept="image/*,video/*"><small id="bg-night-status">Uses morning</small></label>
          </div>
        </div>

        <div class="settings-section">
          <span class="settings-label">Show</span>
          <label class="toggle-row"><span>Greeting</span><input type="checkbox" id="tog-greeting" class="toggle"></label>
          <label class="toggle-row"><span>Daily quote</span><input type="checkbox" id="tog-quote" class="toggle"></label>
          <label class="toggle-row"><span>Pomodoro timer</span><input type="checkbox" id="tog-pomo" class="toggle"></label>
          <label class="toggle-row"><span>Ambient embers</span><input type="checkbox" id="tog-embers" class="toggle"></label>
          <label class="toggle-row"><span>Seconds on clock</span><input type="checkbox" id="tog-seconds" class="toggle"></label>
        </div>

        <button id="settings-reset" class="settings-reset">Reset to defaults</button>
      </div>
    </div>
    <div id="music-container">
      <iframe src="https://spotify-github-profile.kittinanx.com/api/view?uid=3175hisspgxdkndtrkqx4hmwhtuu&cover_image=true&theme=novatorem&show_offline=true&background_color=1f1f1f&interchange=true&bar_color=53b14f&bar_color_cover=false" frameborder="0"></iframe>
    </div>

    <div id="modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <p class="modal-title" id="modal-title">Add</p>
        <div class="modal-fields"></div>
        <div class="modal-actions">
          <button type="button" class="modal-btn modal-cancel">Cancel</button>
          <button type="button" class="modal-btn modal-confirm">Add</button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
    <script src="./features.js"></script>
    <script src="./parallax.js"></script>
  </body>
</html>
